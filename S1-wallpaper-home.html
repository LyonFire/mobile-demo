<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S1 · 壁纸主页</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, 'Microsoft YaHei', sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone-frame {
    width: 375px;
    height: 812px;
    position: relative;
    overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 0 0 8px #1a1a1a, 0 20px 60px rgba(0,0,0,0.5);
  }

  /* 全屏壁纸 */
  .wallpaper {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.25) 100%),
      url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80') center/cover;
    transition: opacity 0.6s ease;
  }
  .wallpaper.ocean {
    background:
      linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.25) 100%),
      url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80') center/cover;
  }
  .wallpaper.room {
    background:
      linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.25) 100%),
      url('https://images.unsplash.com/photo-1513694203232-719a280e022f?w=800&q=80') center/cover;
  }

  /* 顶部：只有音频图标（无背景无边框） */
  .top-bar {
    position: absolute;
    top: 54px;
    right: 24px;
    z-index: 10;
  }

  .audio-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #fff;
    transition: opacity 0.2s;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .audio-btn:hover { opacity: 0.7; }

  /* 主题切换（隐藏，长按壁纸触发） */
  .theme-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    display: flex;
    gap: 12px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 16px 20px;
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .theme-panel.show {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }

  .theme-btn {
    width: 56px; height: 56px;
    border-radius: 16px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.1);
    font-size: 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .theme-btn.active {
    border-color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.2);
  }
  .theme-btn:hover { background: rgba(255,255,255,0.2); }

  /* Demo 状态切换 */
  .demo-switcher {
    position: absolute;
    top: 54px;
    left: 24px;
    display: flex;
    gap: 2px;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 3px;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .demo-tab {
    padding: 4px 12px;
    border-radius: 13px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .demo-tab.active {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }

  /* 毛玻璃文案卡片 — 垂直居中 */
  .card-container {
    position: absolute;
    top: 50%;
    left: 24px;
    right: 24px;
    transform: translateY(-50%);
    z-index: 10;
    perspective: 800px;
  }

  .card-flipper {
    position: relative;
    width: 100%;
    min-height: 180px;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .card-flipper.flipped { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 24px;
    padding: 28px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.12),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .card-back { transform: rotateY(180deg); }

  .flip-btn {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: none;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .flip-btn:hover {
    transform: rotate(180deg);
    opacity: 0.7;
  }

  .status-line {
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .emotion-line {
    font-size: 17px;
    color: rgba(255,255,255,0.75);
    line-height: 1.6;
    font-weight: 300;
  }

  .card-link {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 20px;
    display: block;
  }

  .card-back-title {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-back-quote {
    font-size: 17px;
    color: rgba(255,255,255,0.9);
    line-height: 1.8;
    font-weight: 300;
  }

  .card-back-source {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 18px;
  }

  /* 遮罩 */
  .dial-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 12;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .dial-overlay.open { opacity: 1; pointer-events: auto; }

  /* 轮盘按钮 — 上移 */
  .dial-container {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
  }

  .dial-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .dial-btn:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.28);
  }

  .dial-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.8);
    transition: all 0.3s;
  }

  /* 轮盘展开 — 圆弧环绕布局，锚定在 dial-container 内 */
  .dial-ring {
    position: absolute;
    bottom: 28px;
    left: 28px;
    width: 0; height: 0;
    z-index: 15;
    pointer-events: none;
  }
  .dial-ring.open { pointer-events: auto; }

  .dial-item {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .dial-ring.open .dial-item { opacity: 1; }

  .dial-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.2s;
  }
  .dial-item:hover .dial-icon {
    background: rgba(255,255,255,0.3);
    transform: scale(1.1);
  }

  .dial-label {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
  }

  /* 入场动画 */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) translateX(0); }
    to   { opacity: 1; transform: translateY(-50%); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.15); }
  }

  .wallpaper { animation: fadeIn 0.6s ease-out; }
  .card-container {
    opacity: 0;
    animation: slideUp 0.5s ease-out 0.4s forwards;
  }
  .dial-container { animation: bounce 0.4s ease-out 1s both; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="wallpaper" id="wallpaper"
       onmousedown="startLongPress()" onmouseup="endLongPress()" onmouseleave="endLongPress()"
       ontouchstart="startLongPress()" ontouchend="endLongPress()"></div>

  <!-- 顶部：只有音频图标 -->
  <div class="top-bar">
    <button class="audio-btn" onclick="toggleAudio(this)" title="白噪音" id="audioBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </button>
  </div>

  <!-- 隐藏的主题切换面板（长按壁纸触发） -->
  <div class="theme-panel" id="themePanel">
    <button class="theme-btn active" onclick="switchTheme('forest', this)">🌲</button>
    <button class="theme-btn" onclick="switchTheme('ocean', this)">🌊</button>
    <button class="theme-btn" onclick="switchTheme('room', this)">🏠</button>
  </div>

  <!-- Demo 状态切换 -->
  <div class="demo-switcher">
    <button class="demo-tab active" onclick="switchState('service', this)">服务中</button>
    <button class="demo-tab" onclick="switchState('waiting', this)">等待中</button>
    <button class="demo-tab" onclick="switchState('free', this)">自由</button>
  </div>

  <!-- 遮罩 -->
  <div class="dial-overlay" id="dialOverlay" onclick="toggleDial()"></div>

  <!-- 毛玻璃文案卡片（垂直居中） -->
  <div class="card-container">
    <div class="card-flipper" id="cardFlipper">
      <div class="card-front">
        <button class="flip-btn" onclick="flipCard()" title="翻转"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
        <div class="status-line" id="statusLine">张老师 9:05 到达<br>XX 小学</div>
        <div class="emotion-line" id="emotionLine">今天的陪伴已经开始了 ☀️</div>
        <span class="card-link" id="cardLink">点击查看详情 →</span>
      </div>
      <div class="card-back">
        <button class="flip-btn" onclick="flipCard()" title="翻回"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
        <div class="card-back-title">📖 今日育儿一课</div>
        <div class="card-back-quote">「当孩子说'我不要'的时候，他其实在说'我需要你理解我'。」</div>
        <div class="card-back-source">——《非暴力沟通》</div>
      </div>
    </div>
  </div>

  <!-- 轮盘按钮 + 环形菜单（同一容器，确保圆心对齐） -->
  <div class="dial-container">
    <div class="dial-ring" id="dialRing">
      <div class="dial-item" id="dialReport">
        <div class="dial-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
        <div class="dial-label">看报告</div>
      </div>
      <div class="dial-item" id="dialProgress">
        <div class="dial-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="10" y1="14" x2="14" y2="14"/></svg></div>
        <div class="dial-label">看进展</div>
      </div>
      <div class="dial-item" id="dialOrgs">
        <div class="dial-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg></div>
        <div class="dial-label">看机构</div>
      </div>
      <div class="dial-item" id="dialProfile">
        <div class="dial-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="dial-label">个人中心</div>
      </div>
    </div>
    <button class="dial-btn" id="dialBtn" onclick="toggleDial()">
      <div class="dial-dot"></div>
    </button>
  </div>
</div>

<script>
  // 长按壁纸显示主题切换
  let longPressTimer = null;
  function startLongPress() {
    longPressTimer = setTimeout(() => {
      document.getElementById('themePanel').classList.add('show');
    }, 500);
  }
  function endLongPress() {
    clearTimeout(longPressTimer);
  }
  // 点击面板外关闭
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('themePanel');
    if (panel.classList.contains('show') && !panel.contains(e.target)) {
      panel.classList.remove('show');
    }
  });

  function switchTheme(theme, btn) {
    const wp = document.getElementById('wallpaper');
    wp.className = 'wallpaper' + (theme !== 'forest' ? ' ' + theme : '');
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setTimeout(() => document.getElementById('themePanel').classList.remove('show'), 300);
  }

  let audioOn = false;
  function toggleAudio(btn) {
    audioOn = !audioOn;
    btn.innerHTML = audioOn
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  }

  function flipCard() {
    document.getElementById('cardFlipper').classList.toggle('flipped');
  }

  // 轮盘 — 圆弧环绕展开
  let dialOpen = false;
  function toggleDial() {
    dialOpen = !dialOpen;
    const ring = document.getElementById('dialRing');
    const overlay = document.getElementById('dialOverlay');

    if (dialOpen) positionDialItems();
    ring.classList.toggle('open', dialOpen);
    overlay.classList.toggle('open', dialOpen);
  }

  function positionDialItems() {
    const items = document.querySelectorAll('#dialRing .dial-item');
    const visibleItems = Array.from(items).filter(i => i.style.display !== 'none');
    const count = visibleItems.length;
    const radius = 110; // 圆弧半径
    const itemSize = 52; // 图标尺寸

    // 上半圆弧：从左到右均匀分布
    // 2个按钮：-135°, -45°（左上、右上）
    // 4个按钮：-150°, -110°, -70°, -30°
    let angles;
    if (count === 2) {
      angles = [-135, -45];
    } else if (count === 3) {
      angles = [-150, -90, -30];
    } else {
      angles = [-155, -115, -65, -25];
    }

    visibleItems.forEach((item, i) => {
      const rad = (angles[i] * Math.PI) / 180;
      const x = Math.cos(rad) * radius;
      const y = Math.sin(rad) * radius;
      // 相对于 dial-ring 锚点（轮盘按钮中心）
      item.style.left = (x - itemSize / 2) + 'px';
      item.style.bottom = (-y - itemSize / 2) + 'px';
      item.style.transitionDelay = (i * 0.04) + 's';
    });
  }

  // 状态切换
  const states = {
    service: {
      status: '张老师 9:05 到达<br>XX 小学',
      emotion: '今天的陪伴已经开始了 ☀️',
      link: '点击查看详情 →',
      showStatus: true,
      fullDial: true
    },
    waiting: {
      status: '顾问正在了解你的需求',
      emotion: '慢慢来，一起来。',
      link: '',
      showStatus: true,
      fullDial: false
    },
    free: {
      status: '',
      emotion: '每一小步，都值得被看见。',
      link: '',
      showStatus: false,
      fullDial: false
    }
  };

  function switchState(state, btn) {
    const s = states[state];
    document.getElementById('statusLine').innerHTML = s.status;
    document.getElementById('statusLine').style.display = s.showStatus ? 'block' : 'none';
    document.getElementById('emotionLine').textContent = s.emotion;
    const linkEl = document.getElementById('cardLink');
    linkEl.textContent = s.link;
    linkEl.style.display = s.link ? 'block' : 'none';

    document.getElementById('dialReport').style.display = s.fullDial ? 'flex' : 'none';
    document.getElementById('dialProgress').style.display = s.fullDial ? 'flex' : 'none';

    document.querySelectorAll('.demo-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    // 关闭轮盘重新定位
    if (dialOpen) {
      dialOpen = false;
      document.getElementById('dialRing').classList.remove('open');
      document.getElementById('dialOverlay').classList.remove('open');
    }
  }
</script>

</body>
</html>
